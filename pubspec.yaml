name: xxo25
description: "Bug WhatsApp Crasher"
publish_to: 'none'
version: 2.0.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  youtube_player_flutter: ^9.1.1
  just_audio: ^0.9.39
  image_picker: ^1.0.7
  intl: ^0.19.0
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0
  carousel_slider: 4.0.0
  web_socket_channel: ^2.4.0
  network_info_plus: ^4.1.0
  permission_handler: ^11.0.0
  video_player: ^2.9.2
  font_awesome_flutter: ^10.10.0
  path_provider: ^2.1.1
  share_plus: ^7.0.1
  chewie: ^1.5.2
  audioplayers: ^6.6.0
  gallery_saver_plus: ^3.2.9
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  webview_flutter: ^4.8.0
  shimmer: ^3.0.0
  
dev_dependencies:
  flutter_launcher_icons: ^0.13.1 # versi terbaru saat ini
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: assets/icon/icon.jpg
  image_path_ios: assets/icon/icon/icon.jpg
  image_path: assets/icon/icon.jpg
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/videos/
    - assets/images/
    - assets/images/logo.png
    - assets/images/logoo.png
    - assets/images/login.png
    - assets/videos/splash.mp4
    - assets/videos/banner.mp4

  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/x.ttf
    - family: ShareTechMono
      fonts:
        - asset: fonts/ShareTechMono-Regular.ttf
